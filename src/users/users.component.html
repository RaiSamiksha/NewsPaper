<mat-card class="example-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>User</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>{{newsPaperData}}</p>
    </mat-card-content>
    <mat-card-footer class="example-card-footer">
      <mat-chip-set aria-label="Chihuahua traits">
        <mat-chip (click)="getData()">Subscribe</mat-chip>
        <mat-chip (click)="unsubscribe()">Unsubscribe</mat-chip>
      </mat-chip-set>
    </mat-card-footer>
  </mat-card>
